<!doctype html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>다중 선택 참여</title>
  <link rel="stylesheet" href="./styles.css" />
</head>
<body>
  <div class="mobile stack">
    <section class="card stack">
      <h1 id="title">세션 확인 중...</h1>
      <p id="options" class="small"></p>

      <div id="choiceArea" class="stack hidden">
        <div id="choiceButtons" class="choice-buttons"></div>
        <div>
          <label for="reasonInput">선택 이유 (필수)</label>
          <textarea id="reasonInput" maxlength="200" placeholder="왜 이 선택지를 골랐는지 간단히 적어주세요."></textarea>
        </div>
        <button id="submitVote" class="primary">선택 제출</button>
      </div>

      <div id="messageArea" class="stack center">
        <p id="message" class="small">잠시만 기다려 주세요.</p>
      </div>
    </section>
  </div>

  <script src="./config.js"></script>
  <script src="./api.js"></script>
  <script src="./participant.js"></script>
</body>
</html>
