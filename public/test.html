<!doctype html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>다중 선택 테스트 페이지</title>
  <link rel="stylesheet" href="./styles.css" />
</head>
<body>
  <div class="container stack">
    <h1>다중 선택 테스트 페이지</h1>
    <p class="small">CLIENT에서 Apps Script URL을 저장한 뒤 빠른 동작 검증에 사용하세요.</p>

    <section class="card stack">
      <h2>1) 테스트 조사 생성</h2>
      <form id="testGameForm" class="stack">
        <div>
          <label for="title">주제</label>
          <input id="title" name="title" required value="오늘 간식 메뉴" />
        </div>
        <div>
          <label for="optionsCsv">선택지(쉼표 구분, 2~5개)</label>
          <input id="optionsCsv" name="optionsCsv" required value="쿠키,과일,샌드위치" />
        </div>
        <button type="submit" class="primary">조사 생성 + 세션 시작</button>
      </form>
      <p id="currentSession" class="small">아직 생성된 세션이 없습니다.</p>
      <div class="grid grid-2">
        <a id="participantLink" class="session-link" href="#">참여 링크 대기 중</a>
        <a id="hostSessionLink" class="session-link" href="#">HOST 링크 대기 중</a>
      </div>
    </section>

    <section class="card stack">
      <h2>2) 결과 확인</h2>
      <button id="closeSession" class="danger">세션 종료</button>
      <div id="resultList" class="stack small">결과가 아직 없습니다.</div>
    </section>

    <section class="card stack">
      <h2>실시간 로그</h2>
      <pre id="logs" class="log-box"></pre>
    </section>
  </div>

  <script src="./config.js"></script>
  <script src="./api.js"></script>
  <script src="./test.js"></script>
</body>
</html>
