<!doctype html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>선택 비교 HOST</title>
  <link rel="stylesheet" href="./styles.css" />
</head>
<body>
  <div class="mobile stack">
    <section class="card stack">
      <h1>HOST 진행 페이지</h1>
      <p class="small">진행 중 세션이 자동 연결됩니다. 종료 전에는 참여자 수만 표시되고, 종료 후 선택 결과 + 개별 의견 목록이 공개됩니다.</p>
      <a class="session-link" href="./client.html" target="_blank" rel="noreferrer">CLIENT 관리 페이지 열기</a>
    </section>

    <section class="card stack" id="sessionPanel">
      <h2 id="gameTitle">세션 자동 확인 중...</h2>
      <p class="small" id="gameOptions"></p>
      <div id="hostOptionButtons" class="host-option-row"></div>
      <p class="small" id="sessionState">진행 상태: -</p>
      <p class="small" id="participantCount">실시간 참여자 수: -</p>

      <div id="resultPanel" class="stack hidden">
        <h3>최종 결과 비교</h3>
        <div id="resultGrid" class="result-grid"></div>
        <h3>선택 이유 개별 의견</h3>
        <div id="reasonListArea" class="grid grid-2"></div>
        <p class="small" id="resultSummary">-</p>
      </div>

      <button id="closeSession" class="danger">투표 종료 및 결과 공개</button>
    </section>

    <section class="card stack">
      <h2>실시간 로그</h2>
      <pre id="logs" class="log-box"></pre>
    </section>
  </div>

  <script src="./config.js"></script>
  <script src="./api.js"></script>
  <script src="./host.js"></script>
</body>
</html>
