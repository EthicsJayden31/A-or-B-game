<!doctype html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>선택 비교 조사 CLIENT</title>
  <link rel="stylesheet" href="./styles.css" />
</head>
<body>
  <div class="container stack">
    <h1>다중 선택 + 사유 워드클라우드 조사</h1>
    <p class="small">설문 주제와 2~5개 선택지를 만들고, HOST/PARTICIPANT 페이지로 진행하세요.</p>

    <div class="grid grid-2">
      <a id="hostEntryLink" class="session-link" href="./host.html" target="_blank" rel="noreferrer">HOST 페이지 열기(자동 연결)</a>
      <a id="participantEntryLink" class="session-link" href="./participant.html" target="_blank" rel="noreferrer">PARTICIPANT 페이지 열기(자동 연결)</a>
    </div>

    <section class="card stack">
      <h2>Google Apps Script 연결</h2>
      <label for="apiBaseUrl">Web App URL</label>
      <input id="apiBaseUrl" placeholder="https://script.google.com/macros/s/.../exec" />
      <button id="saveApiConfig">URL 저장</button>
      <p class="small">한 번 저장하면 브라우저 localStorage에 보관됩니다.</p>
    </section>

    <section class="card stack">
      <h2>새 조사 설계</h2>
      <form id="createGameForm" class="stack">
        <div>
          <label for="title">주제</label>
          <input id="title" name="title" maxlength="80" required placeholder="예: 이번 워크숍 점심 메뉴는?" />
        </div>
        <div class="stack">
          <label>선택지 (최소 2개 / 최대 5개)</label>
          <div id="optionInputs" class="stack"></div>
          <button id="addOption" type="button" class="ghost">선택지 추가</button>
        </div>
        <button class="primary" type="submit">조사 저장</button>
      </form>
      <p id="status" class="small"></p>
    </section>

    <section class="stack" id="games"></section>

    <section class="card stack">
      <h2>실시간 로그</h2>
      <pre id="logs" class="log-box"></pre>
    </section>
  </div>

  <script src="./config.js"></script>
  <script src="./api.js"></script>
  <script src="./client.js"></script>
</body>
</html>
